<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: rgb(100, 139, 0);">
    <h2 style="text-align: center;">Registration Form</h2>
    <form action="">

        <fieldset style="background-color: rgb(237, 187, 100); border: 3px brown solid;">
            <legend style="font-size: 30px;">Personal Information</legend>
                <label for="firstName">First Name:</label><br>
                <input class="design" type="text" name="firstName" id="firstName" placeholder="Enter first name" required><br><br>

                <label for="lastName">Last Name:</label><br>
                <input class="design" type="text" name="lastName" id="lastName" placeholder="Enter last name" required><br><br>

                <label for="userName">Username:</label><br>
                <input class="design" type="text" name="userName" id="userName" placeholder="Enter username" required><br><br>
        
                <label for="Password">Password</label><br>
                <input class="design" type="password" name="Password" id="Password" placeholder="Password" required><br><br>

                <label for="Email">Email:</label><br>
                <input class="design" type="Email" name="Email" id="Email" placeholder="abc@example.com" required><br><br>

                <label for="Phone">Phone:</label><br>
                <input class="design" type="tel" name="Phone" id="Phone" placeholder="+923xxxxxxxxxx" required><br><br>

                <label for="dob">Date of Birth:</label><br>
                <input class="design" type="date" name="dob" id="dob" required><br><br>

                <label for="age">Age:</label><br>
                <input class="design" type="number" name="age" id="age" min="1" max="100" required><br><br>

                <label for="submit">Submit</label><br>
                <input class="design" type="submit" name="submit" id="submit" required><br><br>



        </fieldset>

    </form>

</body>
</html>
